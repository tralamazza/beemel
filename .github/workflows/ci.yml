name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets
      - run: cargo test

  # Copy-paste detection gate. Config lives in .jscpd.json; it MUST keep maxLines
  # high, or jscpd silently skips files over 1000 lines (ir.rs, checker.rs,
  # parser.rs -- the ones most likely to grow duplication) and reports a falsely
  # low number. Isolated from the Rust job so a registry hiccup can't block it.
  duplication:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The gate: a non-zero exit (threshold exceeded) fails the job. jscpd also
      # writes report/jscpd-report.md via the markdown reporter (.jscpd.json),
      # which the next step publishes to the run summary on pass or fail.
      - run: npx --yes jscpd@4.2.4
      - name: Publish duplication report to step summary
        if: always()
        run: |
          if [ -f report/jscpd-report.md ]; then
            cat report/jscpd-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "jscpd report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi
